name: PR Lifecycle Automation Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: pr-lifecycle-${{ github.repository }}
  cancel-in-progress: false

env:
  MAX_CONCURRENT_REVIEW_CYCLES: "5"
  MAX_REVIEW_RETRIES: "5"
  REVIEW_POLL_ATTEMPTS: "15"
  REVIEW_POLL_SECONDS: "20"
  MERGE_LOCK_TTL_MINUTES: "30"
  LINKED_PR_MARKER: "[copilot-linked-pr]:"
  INFORMATIONAL_REVIEW_COMMENT_REGEX: "nit|nits|style|formatting|informational|optional|already handled by lint|already handled by linter"

jobs:
  discover-prs:
    name: Discover open PRs
    runs-on: ubuntu-latest
    outputs:
      pr_matrix: ${{ steps.discover.outputs.pr_matrix }}
    steps:
      - name: Discover and categorize open PRs
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const allOpenPRs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: "main",
              sort: "created",
              direction: "asc",
              per_page: 100,
            });

            const category = {
              draft: [],
              ready: [],
              withComments: [],
              approved: [],
              skipped: [],
            };

            const processable = [];

            for (const pr of allOpenPRs) {
              if ((pr.head.repo?.full_name || "").toLowerCase() !== `${owner}/${repo}`.toLowerCase()) {
                core.info(`Skipping PR #${pr.number} from forked repository head ${pr.head.repo?.full_name || "unknown"}.`);
                category.skipped.push(pr.number);
                continue;
              }

              const labels = pr.labels.map((label) => label.name);
              if (labels.includes("agent-processing")) {
                category.skipped.push(pr.number);
                continue;
              }

              if (pr.draft) {
                category.draft.push(pr.number);
              } else {
                category.ready.push(pr.number);
              }

              processable.push({
                number: pr.number,
                draft: pr.draft,
                headRef: pr.head.ref,
                headSha: pr.head.sha,
                baseRef: pr.base.ref,
                baseSha: pr.base.sha,
              });
            }

            const maxConcurrent = Number.parseInt(process.env.MAX_CONCURRENT_REVIEW_CYCLES || "5", 10);
            const limited = processable.slice(0, maxConcurrent);

            for (const pr of limited) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });

              const hasCommentReview = reviews.some(
                (review) => review.state === "COMMENTED" || review.state === "CHANGES_REQUESTED",
              );
              const hasApproval = reviews.some((review) => review.state === "APPROVED");

              if (hasCommentReview) {
                category.withComments.push(pr.number);
              }
              if (hasApproval) {
                category.approved.push(pr.number);
              }
            }

            core.info(`Discovered ${allOpenPRs.length} open PR(s) targeting main.`);
            core.info(`Draft: ${category.draft.join(", ") || "none"}`);
            core.info(`Ready: ${category.ready.join(", ") || "none"}`);
            core.info(`With review comments: ${category.withComments.join(", ") || "none"}`);
            core.info(`Approved: ${category.approved.join(", ") || "none"}`);
            core.info(`Skipped (already processing): ${category.skipped.join(", ") || "none"}`);
            core.setOutput("pr_matrix", JSON.stringify(limited));

  process-pr:
    name: Process PR #${{ matrix.pr.number }}
    needs: discover-prs
    if: ${{ needs.discover-prs.outputs.pr_matrix != '[]' && needs.discover-prs.outputs.pr_matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    concurrency:
      group: pr-lifecycle-pr-${{ matrix.pr.number }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr: ${{ fromJson(needs.discover-prs.outputs.pr_matrix) }}
    steps:
      - name: Add processing label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number("${{ matrix.pr.number }}");

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ["agent-processing"],
            });

      - name: Evaluate retry budget
        id: retry_budget
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number("${{ matrix.pr.number }}");

            const issue = (await github.rest.issues.get({
              owner,
              repo,
              issue_number,
            })).data;

            let retries = 0;
            for (const label of issue.labels) {
              const name = typeof label === "string" ? label : label.name;
              const match = /^agent-review-retry-(\d+)$/.exec(name || "");
              if (match) {
                retries = Math.max(retries, Number(match[1]));
              }
            }

            const maxRetries = Number(process.env.MAX_REVIEW_RETRIES || "5");
            const blocked = retries >= maxRetries;
            core.info(`retry_count=${retries}, blocked=${blocked}`);
            core.setOutput("retry_count", String(retries));
            core.setOutput("blocked", String(blocked));

      - name: Validate draft PR checks
        if: ${{ matrix.pr.draft == true && steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = "${{ matrix.pr.headSha }}";

            const checks = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: headSha,
              per_page: 100,
            });
            const failedChecks = checks.data.check_runs.filter(
              (check) => check.conclusion && !["success", "skipped", "neutral"].includes(check.conclusion),
            );
            const pendingChecks = checks.data.check_runs.filter(
              (check) => !check.conclusion || check.status !== "completed",
            );

            if (failedChecks.length > 0) {
              core.setFailed(`Draft PR has failing checks: ${failedChecks.map((check) => check.name).join(", ")}`);
              return;
            }

            if (pendingChecks.length > 0) {
              core.setFailed(`Draft PR has pending checks: ${pendingChecks.map((check) => check.name).join(", ")}`);
              return;
            }

      - name: Convert draft to ready for review
        if: ${{ matrix.pr.draft == true && steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");

            await github.rest.pulls.readyForReview({
              owner,
              repo,
              pull_number,
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: ["agent-review-cycle"],
            });

      - name: Process updates after review comments
        id: post_review_updates
        if: ${{ steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");
            const headRef = "${{ matrix.pr.headRef }}";
            const isDraft = String("${{ matrix.pr.draft }}") === "true";
            const linkedPrMarker = process.env.LINKED_PR_MARKER || "[copilot-linked-pr]:";
            const trustedCopilotLogins = new Set([
              "github-copilot[bot]",
              "copilot-pull-request-reviewer[bot]",
              "copilot-swe-agent[bot]",
            ]);

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const linkedPrRegex = new RegExp(
              `${escapeRegex(linkedPrMarker)}\\s*https://github\\.com/${escapeRegex(owner)}/${escapeRegex(repo)}/pull/(\\d+)`,
              "i",
            );

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const actionableReviewComments = reviewComments.filter((comment) => {
              const author = (comment.user?.login || "").toLowerCase();
              if (comment.in_reply_to_id) {
                return false;
              }
              return trustedCopilotLogins.has(author) && comment.user?.type === "Bot";
            });

            const latestActionableAt = actionableReviewComments
              .map((comment) => new Date(comment.created_at || comment.updated_at || 0))
              .filter((date) => !Number.isNaN(date.getTime()))
              .sort((a, b) => b.getTime() - a.getTime())[0] || null;

            const currentPr = (await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            })).data;

            const headCommit = (await github.rest.repos.getCommit({
              owner,
              repo,
              ref: currentPr.head.sha,
            })).data;
            const headCommitTime = new Date(
              headCommit.commit?.committer?.date ||
              headCommit.commit?.author?.date ||
              currentPr.updated_at,
            );

            const hasCommitAfterComments = Boolean(
              latestActionableAt && headCommitTime > latestActionableAt,
            );

            let mergedLinkedPr = false;
            let linkedPrNumber = null;

            if (latestActionableAt) {
              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100,
              });

              for (const comment of issueComments) {
                const createdAt = new Date(comment.created_at || 0);
                if (!(createdAt > latestActionableAt)) {
                  continue;
                }

                const commentAuthor = (comment.user?.login || "").toLowerCase();
                if (!trustedCopilotLogins.has(commentAuthor) || comment.user?.type !== "Bot") {
                  continue;
                }

                const body = comment.body || "";
                const candidateMatch = linkedPrRegex.exec(body);
                if (!candidateMatch) {
                  continue;
                }

                const candidate = Number(candidateMatch[1]);
                if (candidate === pull_number) {
                  continue;
                }

                const linkedPr = (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: candidate,
                })).data;

                if (linkedPr.state === "open" && linkedPr.base.ref !== headRef) {
                  try {
                    await github.rest.pulls.update({
                      owner,
                      repo,
                      pull_number: candidate,
                      base: headRef,
                    });
                  } catch (error) {
                    core.warning(`Could not retarget linked PR #${candidate} to ${headRef}: ${error.message}`);
                  }
                }

                const refreshed = (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: candidate,
                })).data;

                if (refreshed.state === "open" && refreshed.base.ref === headRef) {
                  const linkedChecks = await github.rest.checks.listForRef({
                    owner,
                    repo,
                    ref: refreshed.head.sha,
                    per_page: 100,
                  });
                  const failedLinkedChecks = linkedChecks.data.check_runs.filter(
                    (check) => check.conclusion && !["success", "skipped", "neutral"].includes(check.conclusion),
                  );
                  const pendingLinkedChecks = linkedChecks.data.check_runs.filter(
                    (check) => !check.conclusion || check.status !== "completed",
                  );
                  const linkedCombinedStatus = await github.rest.repos.getCombinedStatusForRef({
                    owner,
                    repo,
                    ref: refreshed.head.sha,
                  });

                  if (
                    failedLinkedChecks.length === 0 &&
                    pendingLinkedChecks.length === 0 &&
                    (linkedCombinedStatus.data.state === "success" || linkedCombinedStatus.data.state === "neutral")
                  ) {
                    await github.rest.pulls.merge({
                      owner,
                      repo,
                      pull_number: candidate,
                      merge_method: "squash",
                      commit_title: `Merge PR #${candidate} into ${headRef} via PR lifecycle agent`,
                      commit_message: `Automated merge of linked PR #${candidate} into ${headRef} after review comments.`,
                    });
                    mergedLinkedPr = true;
                  } else {
                    core.warning(
                      `Linked PR #${candidate} has failing/pending checks; skipping auto-merge.`,
                    );
                  }
                }

                linkedPrNumber = candidate;
                break;
              }
              if (linkedPrNumber) {
                break;
              }
            }

            if (isDraft && (hasCommitAfterComments || mergedLinkedPr)) {
              await github.rest.pulls.readyForReview({
                owner,
                repo,
                pull_number,
              });
            }

            core.info(
              `post_review_updates hasCommitAfterComments=${hasCommitAfterComments} mergedLinkedPr=${mergedLinkedPr} linkedPrNumber=${linkedPrNumber ?? "none"}`,
            );
            core.setOutput("has_commit_after_comments", String(hasCommitAfterComments));
            core.setOutput("merged_linked_pr", String(mergedLinkedPr));
            core.setOutput("linked_pr_number", linkedPrNumber ? String(linkedPrNumber) : "");

      - name: Trigger Copilot review
        id: trigger_review
        if: ${{ steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");
            const trustedCopilotLogins = new Set([
              "github-copilot[bot]",
              "copilot-pull-request-reviewer[bot]",
              "copilot-swe-agent[bot]",
            ]);

            // Best-effort trigger for GitHub Copilot automated review.
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ["github-copilot[bot]"],
              });
            } catch (error) {
              core.warning(`Could not request github-copilot[bot]: ${error.message}`);
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: "@github-copilot review this PR for bugs, security, performance, maintainability, and missing tests.",
            });

            core.setOutput("triggered_at", new Date().toISOString());

      - name: Collect actionable review comments
        id: actionable
        if: ${{ steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");
            const reviewTriggeredAt = new Date("${{ steps.trigger_review.outputs.triggered_at }}");
            const maxAttempts = Number(process.env.REVIEW_POLL_ATTEMPTS || "15");
            const waitSeconds = Number(process.env.REVIEW_POLL_SECONDS || "20");
            const trustedCopilotLogins = new Set([
              "github-copilot[bot]",
              "copilot-pull-request-reviewer[bot]",
              "copilot-swe-agent[bot]",
            ]);

            let reviewsAfterTrigger = [];
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number,
                per_page: 100,
              });

              reviewsAfterTrigger = reviews.filter(
                (review) => new Date(review.submitted_at || review.created_at) >= reviewTriggeredAt,
              );

              if (reviewsAfterTrigger.length > 0) {
                core.info(`Review activity detected after trigger on attempt ${attempt}.`);
                break;
              }

              if (attempt < maxAttempts) {
                core.info(`No new review activity yet (attempt ${attempt}/${maxAttempts}); waiting ${waitSeconds}s...`);
                await new Promise((resolve) => setTimeout(resolve, waitSeconds * 1000));
              }
            }

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            let informationalPattern;
            try {
              informationalPattern = new RegExp(
                process.env.INFORMATIONAL_REVIEW_COMMENT_REGEX,
                "i",
              );
            } catch (error) {
              core.setFailed(`Invalid INFORMATIONAL_REVIEW_COMMENT_REGEX: ${error.message}`);
              return;
            }
            const actionable = reviewComments.filter((comment) => {
              const author = (comment.user?.login || "").toLowerCase();
              if (comment.in_reply_to_id) {
                return false;
              }
              if (!trustedCopilotLogins.has(author) || comment.user?.type !== "Bot") {
                return false;
              }
              if (informationalPattern.test(comment.body || "")) {
                return false;
              }
              return true;
            });

            core.info(`Actionable comments found: ${actionable.length}`);
            core.setOutput("count", String(actionable.length));
            core.setOutput(
              "items",
              JSON.stringify(
                actionable.map((comment) => ({
                  id: comment.id,
                  url: comment.html_url,
                  body: comment.body || "",
                  author: comment.user?.login || "",
                })),
              ),
            );

      - name: Ask Copilot to auto-implement actionable comments
        id: remediation
        if: ${{ steps.retry_budget.outputs.blocked != 'true' && steps.actionable.outputs.count != '0' }}
        uses: actions/github-script@v7
        env:
          ACTIONABLE_ITEMS_JSON: ${{ steps.actionable.outputs.items }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");
            const headRef = "${{ matrix.pr.headRef }}";
            const baseRef = "${{ matrix.pr.baseRef }}";
            const initialHeadSha = "${{ matrix.pr.headSha }}";
            const maxAttempts = Number(process.env.REVIEW_POLL_ATTEMPTS || "15");
            const waitSeconds = Number(process.env.REVIEW_POLL_SECONDS || "20");
            const linkedPrMarker = process.env.LINKED_PR_MARKER || "[copilot-linked-pr]:";
            const trustedCopilotLogins = new Set([
              "github-copilot[bot]",
              "copilot-pull-request-reviewer[bot]",
              "copilot-swe-agent[bot]",
            ]);

            const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const linkedPrRegex = new RegExp(
              `${escapeRegex(linkedPrMarker)}\\s*https://github\\.com/${escapeRegex(owner)}/${escapeRegex(repo)}/pull/(\\d+)`,
              "i",
            );

            const actionableItemsRaw = process.env.ACTIONABLE_ITEMS_JSON || "[]";
            let actionableItems = [];
            try {
              actionableItems = JSON.parse(actionableItemsRaw);
            } catch (error) {
              core.warning(`Unable to parse actionable items output: ${error.message}`);
            }

            const trimmedItems = actionableItems.slice(0, 30);
            const lines = trimmedItems.map((item, index) => {
              const snippet = (item.body || "").replace(/\s+/g, " ").trim().slice(0, 160);
              return `${index + 1}. ${item.url}${snippet ? ` — ${snippet}` : ""}`;
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: [
                "@copilot Please auto-implement all actionable review comments in this PR.",
                "Address each of the comments below and push fixes to this PR branch.",
                "",
                `If a separate PR is required, open it and comment in this exact format on this PR:`,
                `${linkedPrMarker} https://github.com/${owner}/${repo}/pull/<number>`,
                "",
                "**Actionable comments to fix:**",
                ...(lines.length > 0 ? lines : ["- No individual comment links were captured; fix all open Copilot review comments."]),
                "",
                "Requested commit message format:",
                "`fix(review): resolve Copilot feedback`",
              ].join("\n"),
            });

            let currentBranchUpdated = false;
            let linkedPrNumber = null;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const currentPr = (await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              })).data;

              if (currentPr.head.sha !== initialHeadSha) {
                currentBranchUpdated = true;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100,
              });

              for (const comment of comments) {
                const commentAuthor = (comment.user?.login || "").toLowerCase();
                if (!trustedCopilotLogins.has(commentAuthor) || comment.user?.type !== "Bot") {
                  continue;
                }
                const body = comment.body || "";
                const prMatch = linkedPrRegex.exec(body);
                if (!prMatch) {
                  continue;
                }
                const candidate = Number(prMatch[1]);
                if (candidate !== pull_number) {
                  linkedPrNumber = candidate;
                  break;
                }
              }

              if (currentBranchUpdated || linkedPrNumber) {
                core.info(`Detected remediation progress on attempt ${attempt}: currentBranchUpdated=${currentBranchUpdated}, linkedPrNumber=${linkedPrNumber ?? "none"}`);
                break;
              }

              if (attempt < maxAttempts) {
                core.info(`No remediation updates yet (attempt ${attempt}/${maxAttempts}); waiting ${waitSeconds}s...`);
                await new Promise((resolve) => setTimeout(resolve, waitSeconds * 1000));
              }
            }

            let linkedPrMerged = false;
            if (linkedPrNumber) {
              const linkedPr = (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: linkedPrNumber,
              })).data;

              if (linkedPr.state === "open" && linkedPr.base.ref !== headRef) {
                try {
                  await github.rest.pulls.update({
                    owner,
                    repo,
                    pull_number: linkedPrNumber,
                    base: headRef,
                  });
                } catch (error) {
                  core.warning(`Could not retarget linked PR #${linkedPrNumber} to ${headRef}: ${error.message}`);
                }
              }

              const refreshedLinkedPr = (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: linkedPrNumber,
              })).data;

              if (refreshedLinkedPr.state === "open" && refreshedLinkedPr.base.ref === headRef) {
                const linkedChecks = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: refreshedLinkedPr.head.sha,
                  per_page: 100,
                });
                const failedLinkedChecks = linkedChecks.data.check_runs.filter(
                  (check) => check.conclusion && !["success", "skipped", "neutral"].includes(check.conclusion),
                );
                const pendingLinkedChecks = linkedChecks.data.check_runs.filter(
                  (check) => !check.conclusion || check.status !== "completed",
                );
                const linkedCombinedStatus = await github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref: refreshedLinkedPr.head.sha,
                });

                if (
                  failedLinkedChecks.length === 0 &&
                  pendingLinkedChecks.length === 0 &&
                  (linkedCombinedStatus.data.state === "success" || linkedCombinedStatus.data.state === "neutral")
                ) {
                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: linkedPrNumber,
                    merge_method: "squash",
                    commit_title: `Merge PR #${linkedPrNumber} into ${headRef} via PR lifecycle agent`,
                    commit_message: `Automated merge of linked PR #${linkedPrNumber} into ${headRef} after remediation.`,
                  });
                  linkedPrMerged = true;
                } else {
                  core.warning(`Linked PR #${linkedPrNumber} has failing/pending checks; skipping auto-merge.`);
                }
              } else {
                core.warning(
                  `Linked PR #${linkedPrNumber} was not merged automatically (state=${refreshedLinkedPr.state}, base=${refreshedLinkedPr.base.ref}, expected_base=${headRef}, parent_base=${baseRef}).`,
                );
              }

            }

            core.setOutput("current_branch_updated", String(currentBranchUpdated || linkedPrMerged));
            core.setOutput("linked_pr_number", linkedPrNumber ? String(linkedPrNumber) : "");
            core.setOutput("linked_pr_merged", String(linkedPrMerged));

      - name: Resolve open review threads
        id: resolve_threads
        if: ${{ steps.retry_budget.outputs.blocked != 'true' && steps.actionable.outputs.count != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");

            let hasNextPage = true;
            let cursor = null;
            const threadIds = [];

            while (hasNextPage) {
              const response = await github.graphql(
                `query($owner: String!, $repo: String!, $pullNumber: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      reviewThreads(first: 100, after: $cursor) {
                        nodes {
                          id
                          isResolved
                          isOutdated
                          comments(first: 1) {
                            nodes {
                              author {
                                __typename
                                login
                              }
                            }
                          }
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }`,
                {
                  owner,
                  repo,
                  pullNumber: pull_number,
                  cursor,
                },
              );

              const threadConnection = response.repository.pullRequest.reviewThreads;
              for (const thread of threadConnection.nodes || []) {
                const firstAuthor = thread.comments?.nodes?.[0]?.author;
                const firstAuthorLogin = (firstAuthor?.login || "").toLowerCase();
                const isTrustedCopilotThread = (
                  firstAuthor?.__typename === "Bot" &&
                  trustedCopilotLogins.has(firstAuthorLogin)
                );
                if (!thread.isResolved && !thread.isOutdated && thread.id && isTrustedCopilotThread) {
                  threadIds.push(thread.id);
                }
              }

              hasNextPage = Boolean(threadConnection.pageInfo?.hasNextPage);
              cursor = threadConnection.pageInfo?.endCursor ?? null;
            }

            let resolvedCount = 0;
            for (const threadId of threadIds) {
              try {
                await github.graphql(
                  `mutation($threadId: ID!) {
                    resolveReviewThread(input: {threadId: $threadId}) {
                      thread {
                        id
                        isResolved
                      }
                    }
                  }`,
                  { threadId },
                );
                resolvedCount += 1;
              } catch (error) {
                core.warning(`Unable to resolve review thread ${threadId}: ${error.message}`);
              }
            }

            core.info(`Resolved review threads: ${resolvedCount}`);
            core.setOutput("count", String(resolvedCount));

      - name: Re-trigger Copilot review after fixes
        if: ${{ steps.retry_budget.outputs.blocked != 'true' && steps.actionable.outputs.count != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: [
                "Actionable Copilot review comments are still open.",
                "Please apply fixes in this PR branch and re-run review.",
                "",
                `Linked PR merged: ${{ steps.remediation.outputs.linked_pr_merged || 'false' }}`,
                `Resolved review threads: ${{ steps.resolve_threads.outputs.count || '0' }}`,
                "",
                "Re-running review cycle now.",
              ].join("\n"),
            });

      - name: Update retry labels
        if: ${{ steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number("${{ matrix.pr.number }}");
            const actionableCount = Number("${{ steps.actionable.outputs.count || '0' }}");
            const retryCount = Number("${{ steps.retry_budget.outputs.retry_count }}");

            const issue = (await github.rest.issues.get({
              owner,
              repo,
              issue_number,
            })).data;

            for (const label of issue.labels) {
              const name = typeof label === "string" ? label : label.name;
              if (/^agent-review-retry-(\d+)$/.test(name || "")) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name,
                  });
                } catch (error) {
                  core.info(`Unable to remove retry label ${name}: ${error.message}`);
                }
              }
            }

            if (actionableCount > 0) {
              const maxRetries = Number(process.env.MAX_REVIEW_RETRIES || "5");
              const retryLabel = `agent-review-retry-${Math.min(retryCount + 1, maxRetries)}`;

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [retryLabel],
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: retryLabel,
                    color: "f9d0c4",
                    description: "Automated retry marker for PR lifecycle agent",
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [retryLabel],
                });
              }
            }

      - name: Validate merge readiness
        id: merge_ready
        if: ${{ steps.retry_budget.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");

            let pr = (await github.rest.pulls.get({ owner, repo, pull_number })).data;
            const preUpdateHeadSha = pr.head.sha;

            if (pr.mergeable_state === "behind") {
              try {
                await github.rest.pulls.updateBranch({ owner, repo, pull_number });
              } catch (error) {
                core.warning(`Could not update branch: ${error.message}`);
              }

              const updatePollAttempts = 6;
              for (let attempt = 1; attempt <= updatePollAttempts; attempt++) {
                await new Promise((resolve) => setTimeout(resolve, 5000));
                pr = (await github.rest.pulls.get({ owner, repo, pull_number })).data;
                if (pr.head.sha !== preUpdateHeadSha || pr.mergeable_state !== "behind") {
                  break;
                }
              }
            }

            const checks = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.head.sha,
              per_page: 100,
            });
            const failedChecks = checks.data.check_runs.filter(
              (check) => check.conclusion && !["success", "skipped", "neutral"].includes(check.conclusion),
            );
            const pendingChecks = checks.data.check_runs.filter((check) => !check.conclusion || check.status !== "completed");

            const combinedStatus = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: pr.head.sha,
            });

            const unresolvedThreads = [];
            let hasNextPage = true;
            let cursor = null;

            while (hasNextPage) {
              const unresolvedThreadsResponse = await github.graphql(
                `query($owner: String!, $repo: String!, $pullNumber: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      reviewThreads(first: 100, after: $cursor) {
                        nodes {
                          isResolved
                          isOutdated
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }`,
                {
                  owner,
                  repo,
                  pullNumber: pull_number,
                  cursor,
                },
              );

              const threadConnection = unresolvedThreadsResponse.repository.pullRequest.reviewThreads;
              for (const thread of threadConnection.nodes || []) {
                if (!thread.isResolved && !thread.isOutdated) {
                  unresolvedThreads.push(thread);
                }
              }

              hasNextPage = Boolean(threadConnection.pageInfo?.hasNextPage);
              cursor = threadConnection.pageInfo?.endCursor ?? null;
            }

            const commentsCount = Number("${{ steps.actionable.outputs.count }}");
            const canMerge = (
              commentsCount === 0 &&
              failedChecks.length === 0 &&
              pendingChecks.length === 0 &&
              (combinedStatus.data.state === "success" || combinedStatus.data.state === "neutral") &&
              unresolvedThreads.length === 0 &&
              pr.mergeable === true &&
              pr.base.ref === "main" &&
              pr.mergeable_state !== "dirty"
            );

            core.info(`can_merge=${canMerge}`);
            core.setOutput("can_merge", String(canMerge));

      - name: Acquire merge lock and squash-merge
        if: ${{ steps.retry_budget.outputs.blocked != 'true' && steps.merge_ready.outputs.can_merge == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ matrix.pr.number }}");
            const headRef = "${{ matrix.pr.headRef }}";

            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: "main",
              per_page: 100,
            });

            const lockTtlMinutes = Number(process.env.MERGE_LOCK_TTL_MINUTES || "30");
            const now = new Date();
            const mergeLocked = openPRs.some((pr) => {
              if (pr.number === pull_number) {
                return false;
              }
              const hasLock = pr.labels.some((label) => label.name === "agent-merging");
              if (!hasLock) {
                return false;
              }
              const ageMinutes = (now - new Date(pr.updated_at)) / (1000 * 60);
              return ageMinutes <= lockTtlMinutes;
            });

            if (mergeLocked) {
              core.info("Another PR is currently merging. Skipping merge for now.");
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: ["agent-merging"],
            });

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number,
              merge_method: "squash",
              commit_title: `Merge PR #${pull_number} via PR lifecycle agent`,
            });

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${headRef}`,
              });
            } catch (error) {
              core.warning(`Unable to delete branch ${headRef}: ${error.message}`);
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: ["merged-by-agent"],
            });

      - name: Cleanup processing labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number("${{ matrix.pr.number }}");

            for (const label of ["agent-processing", "agent-merging"]) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label,
                });
              } catch (error) {
                core.info(`Label ${label} not present for PR #${issue_number}.`);
              }
            }

      - name: Summary report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ matrix.pr.number }}");
            const actionableCount = Number("${{ steps.actionable.outputs.count || '0' }}");
            const canMerge = "${{ steps.merge_ready.outputs.can_merge || 'false' }}";
            const blocked = "${{ steps.retry_budget.outputs.blocked || 'false' }}";
            const retryCount = Number("${{ steps.retry_budget.outputs.retry_count || '0' }}");
            const commitAfterComments = "${{ steps.post_review_updates.outputs.has_commit_after_comments || 'false' }}";
            const linkedPrMergedBeforeReview = "${{ steps.post_review_updates.outputs.merged_linked_pr || 'false' }}";
            const linkedPrBeforeReview = "${{ steps.post_review_updates.outputs.linked_pr_number || '' }}";
            const maxRetries = process.env.MAX_REVIEW_RETRIES || "5";
            const maxConcurrent = process.env.MAX_CONCURRENT_REVIEW_CYCLES || "5";

            core.summary
              .addHeading(`PR #${prNumber} lifecycle summary`)
              .addRaw(`- Actionable comments detected: ${actionableCount}\n`)
              .addRaw(`- Commit after review comments detected: ${commitAfterComments}\n`)
              .addRaw(`- Linked PR merged before re-review: ${linkedPrMergedBeforeReview}${linkedPrBeforeReview ? ` (#${linkedPrBeforeReview})` : ""}\n`)
              .addRaw(`- Retry count: ${retryCount} / ${maxRetries}\n`)
              .addRaw(`- Blocked by retry budget: ${blocked}\n`)
              .addRaw(`- Merge-ready: ${canMerge}\n`)
              .addRaw(`- Max review retries configured: ${maxRetries} (enforced by repeated workflow cycles)\n`)
              .addRaw(`- Max concurrent review cycles configured: ${maxConcurrent}\n`)
              .addRaw(`- Max simultaneous merges configured: 1 (agent-merging lock)\n`)
              .write();
