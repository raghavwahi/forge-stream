name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ─── API ──────────────────────────────────────────────────────────────────

  api-lint:
    name: API – lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]" 2>/dev/null || pip install .

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy app --ignore-missing-imports || true

  api-test:
    name: API – pytest
    runs-on: ubuntu-latest
    needs: api-lint
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forgestream_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge -d forgestream_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      JWT_SECRET_KEY: test-ci-secret
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: forge
      DB_PASSWORD: forge
      DB_NAME: forgestream_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]" 2>/dev/null || pip install .

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ─── Web ──────────────────────────────────────────────────────────────────

  web-lint:
    name: Web – lint (ESLint + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

  web-build:
    name: Web – next build
    runs-on: ubuntu-latest
    needs: web-lint
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── Docker ───────────────────────────────────────────────────────────────

  docker-build:
    name: Docker – build images
    runs-on: ubuntu-latest
    needs: [api-test, web-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: api
          file: infra/docker/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: api
          file: infra/docker/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: web
          file: infra/docker/Dockerfile.web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
